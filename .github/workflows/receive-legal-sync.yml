name: Receive legal sync

on:
  repository_dispatch:
    types: [sync-legal]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch legal MDs from main repo
        env:
          FILES: "privacy_ja privacy_en terms_ja terms_en"
        run: |
          mkdir -p src/legal
          for file in $FILES; do
            url="https://raw.githubusercontent.com/muranoya/kura/main/assets/legal/${file}.md"
            status=$(curl -sSL -o "src/legal/${file}.md.new" -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              mv "src/legal/${file}.md.new" "src/legal/${file}.md"
              echo "Fetched ${file}.md"
            else
              rm -f "src/legal/${file}.md.new"
              echo "::notice::Skipping ${file}.md (HTTP $status)"
            fi
          done

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/legal/
          if git diff --cached --quiet; then
            echo "No changes to legal docs"
          else
            git commit -m "sync: update legal docs from muranoya/kura@main"
            git push
          fi
